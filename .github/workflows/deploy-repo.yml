name: Sync to Vercel Repo

on:
  push:
    branches:
      - main   # change if needed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout original repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to target repo
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
          TARGET_REPO: ajoebert/translationapp
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git remote add target https://x-access-token:${SYNC_TOKEN}@github.com/${TARGET_REPO}.git

          git push target HEAD:main --force